  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:      #13305C;
      --navy-dark: #0E2547;
      --linen:     #FBF8F2;
      --brass:     #B8924A;
      --brass-lt:  #C9A968;
      --white:     #FFFFFF;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: Georgia, "Bodoni Moda", serif;
      color: var(--white);
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 40px;
      text-align: center;
    }

    /* ── Logo ──────────────────────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .lighthouse {
      width: 80px;
      height: 80px;
      opacity: 0.92;
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--brass-lt);
    }

    /* ── Heading ───────────────────────────────────────────────────── */
    .headline {
      font-size: clamp(28px, 6vw, 48px);
      line-height: 1.1;
      font-style: italic;
      color: var(--linen);
      max-width: 520px;
    }

    .headline em {
      color: var(--brass);
      font-style: normal;
    }

    /* ── Subline ───────────────────────────────────────────────────── */
    .sub {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.65);
      max-width: 400px;
    }

    /* ── CTA Button ────────────────────────────────────────────────── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #25D366;
      color: #fff;
      font-family: inherit;
      font-size: 17px;
      font-style: italic;
      padding: 16px 36px;
      border-radius: 4px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 24px rgba(37,211,102,0.25);
    }

    .cta-btn:hover  { background: #1ebe5d; transform: translateY(-1px); }
    .cta-btn:active { background: #18a850; transform: translateY(0); }

    .wa-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* ── Countdown ─────────────────────────────────────────────────── */
    .redirect-note {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.05em;
    }

    #countdown { color: var(--brass-lt); font-weight: bold; }

    /* ── Progress bar ──────────────────────────────────────────────── */
    .progress-wrap {
      width: min(320px, 80vw);
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: var(--brass);
      border-radius: 2px;
      transform-origin: left;
      transform: scaleX(0);
      animation: progress var(--redirect-delay, 4s) linear forwards;
    }

    @keyframes progress { to { transform: scaleX(1); } }

    /* ── Divider ───────────────────────────────────────────────────── */
    .rule {
      width: 48px;
      height: 1px;
      background: var(--brass);
      opacity: 0.4;
    }

    /* ── Back link ─────────────────────────────────────────────────── */
    .back {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.6); }
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}

<script>
  // ── Constantes ────────────────────────────────────────────────────────────
  const DELAY   = 4;       // segundos antes de redirigir
  const WA_URL  = 'https://wa.me/526675402559?text=Hola%20Faro%2033%2C%20me%20interesa%20comenzar%20un%20proyecto%20integral%20de%20interiorismo.%20%C2%BFPodemos%20platicar%3F';

  // ── Leer parámetros UTM de la URL y pasarlos a fbq ───────────────────────
  (function trackUTM() {
    try {
      const p   = new URLSearchParams(window.location.search);
      const src = p.get('utm_source')   || '';
      const med = p.get('utm_medium')   || '';
      const cam = p.get('utm_campaign') || '';
      if (src || cam) {
        // Pasar datos de campaña como CustomData para mejor atribución
        fbq('trackCustom', 'AdLandingPage', {
          utm_source:   src,
          utm_medium:   med,
          utm_campaign: cam,
        });
      }
    } catch(e) {}
  })();

  // ── Función que se llama al hacer click manual en WhatsApp ────────────────
  function trackWA() {
    try {
      fbq('track', 'Contact');   // evento adicional en click manual
    } catch(e) {}
  }

  // ── Cuenta regresiva y redirección automática ─────────────────────────────
  let remaining = DELAY;
  const countEl = document.getElementById('countdown');

  const timer = setInterval(function() {
    remaining -= 1;
    if (countEl) countEl.textContent = remaining;

    if (remaining <= 0) {
      clearInterval(timer);
      try { fbq('track', 'Contact'); } catch(e) {}   // pixel antes de salir
      window.location.href = WA_URL;
    }
  }, 1000);
</script>
